name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    # Gated until go-live (ADR 0002). Set the DEPLOY_ENABLED repository
    # variable to "true" to enable. Rollback is re-running this workflow on a
    # previous commit.
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Sync compose files to the droplet
        run: scp deploy/compose.yaml deploy/Caddyfile "root@${{ secrets.DEPLOY_HOST }}:/opt/dropin/"

      - name: Deploy
        run: |
          ssh "root@${{ secrets.DEPLOY_HOST }}" \
            "echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin \
            && echo 'IMAGE_TAG=${{ github.sha }}' > /opt/dropin/.env \
            && cd /opt/dropin \
            && docker compose pull -q \
            && docker compose up -d \
            && docker image prune -f"
