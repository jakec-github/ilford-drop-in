services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  app:
    image: ghcr.io/jakec-github/ilford-drop-in:${IMAGE_TAG:-latest}
    restart: unless-stopped
    volumes:
      - ./drop_in_config.prod.yaml:/app/drop_in_config.prod.yaml:ro
      - ./oauthClientWeb.prod.json:/app/oauthClientWeb.prod.json:ro
      - ./serviceAccount.prod.json:/app/serviceAccount.prod.json:ro
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
